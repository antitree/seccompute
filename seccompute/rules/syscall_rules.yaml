# Seccomp Syscall Threat Rules
# Each entry maps a syscall name to its tier, category, and threat data.
# Tier budgets: T1=85, T2=10, T3=5. Per-syscall weight = budget / count(tier).

# ============================================================================
# TIER 1 (budget: 85) - Catastrophic: kernel code exec, container escape
# ============================================================================

bpf:
  tier: 1
  category: "process_inspection"
  description: "Load and interact with eBPF programs. Grants near-arbitrary kernel code execution."
  threats:
    - id: "CVE-2021-3490"
      description: "eBPF ALU32 bounds tracking for bitwise ops OOB write, leading to LPE"
    - id: "CVE-2023-2163"
      description: "eBPF verifier incorrect pruning leading to unsafe program loading"
    - id: "TECHNIQUE-bpf-kernel-exec"
      description: "Load eBPF to read/write arbitrary kernel memory"
  last_reviewed: "2025-01-15"

ptrace:
  tier: 1
  category: "process_inspection"
  description: "Trace/control another process. Container escape vector via host PID injection."
  threats:
    - id: "CVE-2019-13272"
      description: "Privilege escalation via ptrace_link due to incorrect credentials check"
    - id: "TECHNIQUE-container-escape-ptrace"
      description: "Inject code into host process from container via ptrace attach"
  last_reviewed: "2025-01-15"

kexec_load:
  tier: 1
  category: "kernel_module"
  description: "Load a new kernel for later execution. Complete host takeover."
  threats:
    - id: "TECHNIQUE-kexec-rootkit"
      description: "Load a rootkitted kernel image, bypassing all security controls on reboot"
  last_reviewed: "2025-01-15"

kexec_file_load:
  tier: 1
  category: "kernel_module"
  description: "Load a new kernel from a file descriptor. Same risk as kexec_load."
  threats:
    - id: "TECHNIQUE-kexec-rootkit"
      description: "Load a rootkitted kernel image from an fd"
  last_reviewed: "2025-01-15"

init_module:
  tier: 1
  category: "kernel_module"
  description: "Load a kernel module from a buffer. Direct kernel code execution."
  threats:
    - id: "TECHNIQUE-lkm-rootkit"
      description: "Load malicious kernel module for persistent rootkit"
    - id: "CVE-2017-0861"
      description: "Use-after-free in ALSA via crafted kernel module interaction"
  last_reviewed: "2025-01-15"

finit_module:
  tier: 1
  category: "kernel_module"
  description: "Load a kernel module from a file descriptor. Same risk as init_module."
  threats:
    - id: "TECHNIQUE-lkm-rootkit"
      description: "Load malicious kernel module from fd for persistent rootkit"
  last_reviewed: "2025-01-15"

delete_module:
  tier: 1
  category: "kernel_module"
  description: "Unload a kernel module. Can destabilize kernel or disable security modules."
  threats:
    - id: "TECHNIQUE-disable-lsm"
      description: "Unload security modules (AppArmor, SELinux) to disable MAC"
  last_reviewed: "2025-01-15"

process_vm_readv:
  tier: 1
  category: "process_inspection"
  description: "Read memory of another process. Cross-process data exfiltration."
  threats:
    - id: "TECHNIQUE-cross-process-read"
      description: "Read secrets (keys, tokens) from other process memory spaces"
  last_reviewed: "2025-01-15"

process_vm_writev:
  tier: 1
  category: "process_inspection"
  description: "Write to memory of another process. Code injection into other processes."
  threats:
    - id: "TECHNIQUE-cross-process-inject"
      description: "Inject shellcode into another process's address space"
  last_reviewed: "2025-01-15"

# ============================================================================
# TIER 2 (budget: 10) - Serious: namespace/filesystem escape
# ============================================================================

io_uring_setup:
  tier: 2
  category: "io_subsystem"
  description: "Set up io_uring submission/completion queues. Large kernel attack surface."
  threats:
    - id: "CVE-2023-2598"
      description: "io_uring UAF in fixed file slot leading to LPE"
    - id: "CVE-2024-0582"
      description: "io_uring page UAF via IORING_OP_MADVISE"
    - id: "TECHNIQUE-io-uring-escape"
      description: "io_uring bypasses seccomp filters entirely for registered operations"
  last_reviewed: "2025-01-15"

io_uring_enter:
  tier: 2
  category: "io_subsystem"
  description: "Submit and wait for io_uring operations. See io_uring_setup threats."
  threats:
    - id: "CVE-2023-2598"
      description: "io_uring UAF in fixed file slot leading to LPE"
  last_reviewed: "2025-01-15"

io_uring_register:
  tier: 2
  category: "io_subsystem"
  description: "Register resources with io_uring instance. See io_uring_setup threats."
  threats:
    - id: "CVE-2024-0582"
      description: "io_uring page UAF via registered buffer operations"
  last_reviewed: "2025-01-15"

mount:
  tier: 2
  category: "filesystem_escape"
  description: "Mount a filesystem. Can remount host filesystems or overlay sensitive paths."
  threats:
    - id: "TECHNIQUE-mount-escape"
      description: "Mount host filesystem (e.g., /proc, /sys) to escape container"
    - id: "CVE-2019-5736"
      description: "runc container escape via /proc/self/exe (mount manipulation)"
  last_reviewed: "2025-01-15"

umount:
  tier: 2
  category: "filesystem_escape"
  description: "Unmount a filesystem. Can remove security-critical mounts."
  threats:
    - id: "TECHNIQUE-unmount-masking"
      description: "Unmount masking mounts to expose sensitive host paths"
  last_reviewed: "2025-01-15"

umount2:
  tier: 2
  category: "filesystem_escape"
  description: "Unmount with flags (lazy, force). Same risk as umount with more options."
  threats:
    - id: "TECHNIQUE-unmount-masking"
      description: "Force-unmount masking mounts to expose host paths"
  last_reviewed: "2025-01-15"

move_mount:
  tier: 2
  category: "filesystem_escape"
  description: "Move a mount from one location to another. New mount API escape vector."
  threats:
    - id: "TECHNIQUE-mount-escape"
      description: "Relocate mounts to bypass container filesystem layout"
  last_reviewed: "2025-01-15"

open_tree:
  tier: 2
  category: "filesystem_escape"
  description: "Open/clone a mount tree. Enables mount namespace manipulation."
  threats:
    - id: "TECHNIQUE-mount-namespace-clone"
      description: "Clone mount trees across namespace boundaries"
  last_reviewed: "2025-01-15"

fsopen:
  tier: 2
  category: "filesystem_escape"
  description: "Open a filesystem context for configuration. New mount API entry point."
  threats:
    - id: "TECHNIQUE-new-mount-api"
      description: "Configure and create filesystem mounts bypassing traditional mount()"
  last_reviewed: "2025-01-15"

fsmount:
  tier: 2
  category: "filesystem_escape"
  description: "Create a mount from a filesystem context. New mount API mount creation."
  threats:
    - id: "TECHNIQUE-new-mount-api"
      description: "Create mounts from fs context, bypassing traditional mount restrictions"
  last_reviewed: "2025-01-15"

fsconfig:
  tier: 2
  category: "filesystem_escape"
  description: "Configure a filesystem context. New mount API configuration step."
  threats:
    - id: "CVE-2022-0185"
      description: "Heap overflow in legacy_parse_param via fsconfig, leading to container escape"
  last_reviewed: "2025-01-15"

fspick:
  tier: 2
  category: "filesystem_escape"
  description: "Pick an existing mount for reconfiguration. New mount API reconfiguration."
  threats:
    - id: "TECHNIQUE-remount-reconfigure"
      description: "Reconfigure existing mounts to change security properties"
  last_reviewed: "2025-01-15"

setns:
  tier: 2
  category: "namespace_escape"
  description: "Enter an existing namespace. Direct container escape if host ns accessible."
  threats:
    - id: "TECHNIQUE-ns-enter"
      description: "Enter host PID/mount/network namespace from container"
  last_reviewed: "2025-01-15"

unshare:
  tier: 2
  category: "namespace_escape"
  description: "Create new namespaces. Can create user namespace for privilege escalation."
  threats:
    - id: "CVE-2022-0185"
      description: "User namespace creation + fsconfig heap overflow for container escape"
    - id: "TECHNIQUE-userns-escalation"
      description: "Create user namespace to gain capabilities for further exploitation"
  last_reviewed: "2025-01-15"

pivot_root:
  tier: 2
  category: "filesystem_escape"
  description: "Change the root filesystem. Can swap container root with host filesystem."
  threats:
    - id: "TECHNIQUE-pivot-root-escape"
      description: "Pivot to host filesystem to escape container"
  last_reviewed: "2025-01-15"

open_by_handle_at:
  tier: 2
  category: "filesystem_escape"
  description: "Open file by persistent handle. Bypasses pathname-based access controls."
  threats:
    - id: "CVE-2015-1322"
      description: "Container escape via open_by_handle_at brute-forcing file handles"
    - id: "TECHNIQUE-shocker"
      description: "Shocker exploit: brute-force file handles to access host filesystem"
  last_reviewed: "2025-01-15"

keyctl:
  tier: 2
  category: "kernel_keyring"
  description: "Manipulate kernel key management facility. Kernel attack surface."
  threats:
    - id: "CVE-2016-0728"
      description: "Use-after-free in kernel keyring via keyctl, leading to LPE"
    - id: "CVE-2023-3317"
      description: "UAF in kernel keyring during key revocation"
  last_reviewed: "2025-01-15"

add_key:
  tier: 2
  category: "kernel_keyring"
  description: "Add a key to the kernel keyring. Paired with keyctl for keyring attacks."
  threats:
    - id: "CVE-2016-0728"
      description: "Kernel keyring UAF triggered via add_key + keyctl"
  last_reviewed: "2025-01-15"

request_key:
  tier: 2
  category: "kernel_keyring"
  description: "Request a key from the kernel keyring. Kernel attack surface."
  threats:
    - id: "CVE-2016-0728"
      description: "Kernel keyring UAF triggered via request_key sequences"
  last_reviewed: "2025-01-15"

perf_event_open:
  tier: 2
  category: "process_inspection"
  description: "Open a performance monitoring counter. Large kernel attack surface."
  threats:
    - id: "CVE-2022-1729"
      description: "Race condition in perf_event_open leading to LPE"
    - id: "CVE-2023-2002"
      description: "perf_event capabilities check bypass"
  last_reviewed: "2025-01-15"

# ============================================================================
# TIER 3 (budget: 5) - Elevated: contextual risk, DoS, info disclosure
# ============================================================================

clone:
  tier: 3
  category: "namespace_escape"
  description: "Create a child process. Dangerous with CLONE_NEWUSER flag for user namespace creation."
  threats:
    - id: "TECHNIQUE-userns-via-clone"
      description: "Create user namespace via CLONE_NEWUSER to gain capabilities"
  last_reviewed: "2025-01-15"

clone3:
  tier: 3
  category: "namespace_escape"
  description: "Extended clone with struct. Same namespace risk as clone, newer API."
  threats:
    - id: "TECHNIQUE-userns-via-clone3"
      description: "Create user namespace via clone3 struct clone_args"
  last_reviewed: "2025-01-15"

chroot:
  tier: 3
  category: "filesystem_escape"
  description: "Change root directory. Can escape chroot jails but limited in namespace context."
  threats:
    - id: "TECHNIQUE-chroot-escape"
      description: "Classic chroot escape via relative path traversal after chroot"
  last_reviewed: "2025-01-15"

iopl:
  tier: 3
  category: "device_access"
  description: "Change I/O privilege level. Grants direct hardware port access."
  threats:
    - id: "TECHNIQUE-iopl-port-access"
      description: "Set I/O privilege level to access hardware ports directly"
  last_reviewed: "2025-01-15"

ioperm:
  tier: 3
  category: "device_access"
  description: "Set port I/O permissions. Grants access to specific hardware ports."
  threats:
    - id: "TECHNIQUE-ioperm-port-access"
      description: "Grant per-port I/O access for direct hardware manipulation"
  last_reviewed: "2025-01-15"

reboot:
  tier: 3
  category: "system_control"
  description: "Reboot or halt the system. Host-wide denial of service."
  threats:
    - id: "TECHNIQUE-host-dos"
      description: "Reboot/halt the host system from within a container"
  last_reviewed: "2025-01-15"

swapon:
  tier: 3
  category: "memory_management"
  description: "Enable swap on a device. Can cause host memory pressure or data exposure."
  threats:
    - id: "TECHNIQUE-swap-abuse"
      description: "Enable swap to file to leak sensitive memory contents to disk"
  last_reviewed: "2025-01-15"

swapoff:
  tier: 3
  category: "memory_management"
  description: "Disable swap. Can cause host OOM conditions."
  threats:
    - id: "TECHNIQUE-swap-dos"
      description: "Disable swap to trigger OOM killer on the host"
  last_reviewed: "2025-01-15"

sethostname:
  tier: 3
  category: "system_control"
  description: "Set the system hostname. Information disclosure risk, network confusion."
  threats:
    - id: "TECHNIQUE-hostname-spoof"
      description: "Change hostname to confuse monitoring, logging, or service discovery"
  last_reviewed: "2025-01-15"

setdomainname:
  tier: 3
  category: "system_control"
  description: "Set the NIS domain name. Similar risk profile to sethostname."
  threats:
    - id: "TECHNIQUE-domain-spoof"
      description: "Change NIS domain to confuse network services"
  last_reviewed: "2025-01-15"

settimeofday:
  tier: 3
  category: "system_control"
  description: "Set system time. Can break certificate validation and time-based security."
  threats:
    - id: "TECHNIQUE-time-manipulation"
      description: "Set system time to bypass certificate expiry or TOTP windows"
  last_reviewed: "2025-01-15"

clock_settime:
  tier: 3
  category: "system_control"
  description: "Set clock time. Same risk as settimeofday via clock_id interface."
  threats:
    - id: "TECHNIQUE-time-manipulation"
      description: "Manipulate CLOCK_REALTIME to break time-dependent security"
  last_reviewed: "2025-01-15"

vhangup:
  tier: 3
  category: "system_control"
  description: "Simulate hangup on current terminal. Can disrupt terminal sessions."
  threats:
    - id: "TECHNIQUE-tty-disruption"
      description: "Hang up controlling terminal to disrupt interactive sessions"
  last_reviewed: "2025-01-15"

syslog:
  tier: 3
  category: "system_control"
  description: "Read/control kernel log buffer. Information disclosure of kernel messages."
  threats:
    - id: "TECHNIQUE-kptr-leak"
      description: "Read kernel log to obtain kernel pointer addresses for KASLR bypass"
  last_reviewed: "2025-01-15"

pidfd_getfd:
  tier: 3
  category: "process_inspection"
  description: "Get a duplicate of another process's file descriptor via pidfd."
  threats:
    - id: "TECHNIQUE-fd-stealing"
      description: "Steal file descriptors from other processes (sockets, files)"
  last_reviewed: "2025-01-15"

mbind:
  tier: 3
  category: "memory_management"
  description: "Set NUMA memory policy for a memory range. DoS via memory pressure."
  threats:
    - id: "TECHNIQUE-numa-dos"
      description: "Pin memory to specific NUMA nodes to cause memory pressure"
  last_reviewed: "2025-01-15"

migrate_pages:
  tier: 3
  category: "memory_management"
  description: "Move pages of a process to different NUMA nodes. Cross-process manipulation."
  threats:
    - id: "TECHNIQUE-numa-manipulation"
      description: "Migrate another process's pages to cause performance degradation"
  last_reviewed: "2025-01-15"

move_pages:
  tier: 3
  category: "memory_management"
  description: "Move individual pages to specific NUMA nodes. Fine-grained NUMA manipulation."
  threats:
    - id: "TECHNIQUE-numa-side-channel"
      description: "Use page placement to create NUMA-based side channels"
  last_reviewed: "2025-01-15"

quotactl:
  tier: 3
  category: "system_control"
  description: "Manipulate disk quotas. Can disable quotas or cause DoS."
  threats:
    - id: "TECHNIQUE-quota-bypass"
      description: "Disable disk quotas to fill filesystem"
  last_reviewed: "2025-01-15"

acct:
  tier: 3
  category: "system_control"
  description: "Enable/disable process accounting. Information disclosure via accounting file."
  threats:
    - id: "TECHNIQUE-acct-disclosure"
      description: "Enable process accounting to write data to attacker-controlled file"
  last_reviewed: "2025-01-15"

modify_ldt:
  tier: 3
  category: "system_control"
  description: "Modify Local Descriptor Table. x86-specific, can alter segment descriptors."
  threats:
    - id: "CVE-2017-5123"
      description: "LDT UAF in kernel leading to write-what-where"
    - id: "TECHNIQUE-ldt-manipulation"
      description: "Modify LDT entries for code execution in kernel context"
  last_reviewed: "2025-01-15"
